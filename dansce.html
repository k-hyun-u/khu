<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>라인댄스 비디오</title>
    <meta name="theme-color" content="#1a1a2e">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 10px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        /* TV 캐스트 버튼 - 크고 눈에 띄게 */
        .cast-section {
            margin-bottom: 15px;
        }

        .cast-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 18px 24px;
            background: linear-gradient(90deg, #e74c3c, #c0392b);
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
        }

        .cast-btn:hover, .cast-btn:active {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(231, 76, 60, 0.6);
        }

        .cast-btn.connected {
            background: linear-gradient(90deg, #27ae60, #2ecc71);
            box-shadow: 0 4px 15px rgba(39, 174, 96, 0.4);
        }

        .cast-btn svg {
            width: 32px;
            height: 32px;
        }

        .cast-help {
            text-align: center;
            font-size: 0.85rem;
            color: #888;
            margin-top: 8px;
        }

        /* 비디오 플레이어 */
        .video-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* 현재 재생 정보 */
        .now-playing {
            text-align: center;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }

        .now-playing .title {
            color: #a5b4fc;
            font-weight: bold;
        }

        /* 컨트롤 버튼 */
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .control-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .control-btn.prev, .control-btn.next {
            background: rgba(255,255,255,0.15);
            color: white;
        }

        .control-btn.play {
            flex: 1.5;
            background: linear-gradient(90deg, #667eea, #764ba2);
            color: white;
            font-weight: bold;
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        /* 음소거 알림 */
        .mute-notice {
            display: none;
            text-align: center;
            padding: 10px;
            background: rgba(231, 76, 60, 0.3);
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 0.95rem;
            cursor: pointer;
        }

        .mute-notice.show {
            display: block;
        }

        /* 재생 모드 */
        .play-mode {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .mode-btn {
            flex: 1;
            padding: 12px 8px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: transparent;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .mode-btn.active {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.3);
        }

        /* 재생목록 */
        .playlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .playlist-header h2 {
            font-size: 1.1rem;
        }

        .playlist {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .playlist-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .playlist-item:active {
            transform: scale(0.98);
        }

        .playlist-item.playing {
            background: linear-gradient(90deg, rgba(102, 126, 234, 0.3), rgba(118, 75, 162, 0.3));
            border-color: #667eea;
        }

        .item-number {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .playlist-item.playing .item-number {
            background: #667eea;
        }

        .item-title {
            flex: 1;
            font-size: 1rem;
            line-height: 1.4;
        }

        /* 안내 메시지 */
        .help-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }

        .help-modal.show {
            display: block;
        }

        .help-content {
            max-width: 500px;
            margin: 0 auto;
            padding-top: 20px;
        }

        .help-content h2 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .help-step {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
        }

        .help-step strong {
            color: #667eea;
            font-size: 1.1rem;
        }

        .help-step p {
            margin-top: 8px;
            line-height: 1.5;
            color: #ccc;
        }

        .close-help {
            width: 100%;
            padding: 15px;
            background: #667eea;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- TV 캐스트 버튼 (맨 위에 크게) -->
        <div class="cast-section">
            <button class="cast-btn" id="castBtn" onclick="castToTV()">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M1 18v3h3c0-1.66-1.34-3-3-3zm0-4v2c2.76 0 5 2.24 5 5h2c0-3.87-3.13-7-7-7zm0-4v2c4.97 0 9 4.03 9 9h2c0-6.08-4.93-11-11-11zm20-7H3c-1.1 0-2 .9-2 2v3h2V5h18v14h-7v2h7c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/>
                </svg>
                <span id="castText">TV로 보내기</span>
            </button>
            <p class="cast-help">버튼을 누르면 TV 목록이 나타나요</p>
        </div>

        <!-- 음소거 알림 -->
        <div class="mute-notice" id="muteNotice" onclick="unmute()">
            🔇 소리가 꺼져있어요. 여기를 눌러 소리 켜기
        </div>

        <!-- 비디오 플레이어 -->
        <div class="video-container">
            <video id="videoPlayer" playsinline controls muted>
                브라우저가 비디오를 지원하지 않습니다.
            </video>
        </div>

        <!-- 현재 재생 정보 -->
        <div class="now-playing">
            <span id="currentIndex">1</span> / <span id="totalCount">5</span> · 
            <span class="title" id="currentTitle">영상 선택</span>
        </div>

        <!-- 컨트롤 버튼 -->
        <div class="controls">
            <button class="control-btn prev" onclick="prevVideo()">⏮ 이전</button>
            <button class="control-btn play" onclick="togglePlay()" id="playBtn">▶ 재생</button>
            <button class="control-btn next" onclick="nextVideo()">다음 ⏭</button>
        </div>

        <!-- 재생 모드 -->
        <div class="play-mode">
            <button class="mode-btn active" onclick="setPlayMode('all')" id="modeAll">
                🔁 전체반복
            </button>
            <button class="mode-btn" onclick="setPlayMode('single')" id="modeSingle">
                🔂 한곡반복
            </button>
        </div>

        <!-- 재생목록 -->
        <div class="playlist-header">
            <h2>📁 영상 목록</h2>
        </div>
        <div class="playlist" id="playlist"></div>
    </div>

    <!-- 도움말 모달 -->
    <div class="help-modal" id="helpModal">
        <div class="help-content">
            <h2>📺 TV 연결 방법</h2>
            
            <div class="help-step">
                <strong>1. 같은 Wi-Fi 확인</strong>
                <p>휴대폰과 TV가 같은 Wi-Fi에 연결되어 있어야 해요</p>
            </div>
            
            <div class="help-step">
                <strong>2. TV 전원 켜기</strong>
                <p>스마트TV 전원이 켜져 있는지 확인하세요</p>
            </div>
            
            <div class="help-step">
                <strong>3. 다시 버튼 누르기</strong>
                <p>"TV로 보내기" 버튼을 다시 눌러보세요. TV 목록이 나타나면 원하는 TV를 선택하세요</p>
            </div>

            <div class="help-step">
                <strong>💡 안될 경우</strong>
                <p>Chrome 앱의 메뉴(⋮)에서 "전송"을 눌러 TV를 선택할 수도 있어요</p>
            </div>
            
            <button class="close-help" onclick="closeHelp()">확인</button>
        </div>
    </div>

    <script>
        // ========================================
        // 🎬 영상 목록
        // ========================================
        const playlist = [
            {
                title: "라인댄스 1",
                file: "video/YTDown.com_YouTube_Media_LfPG3Chhqrc_001_1080p.mp4"
            },
            {
                title: "라인댄스 2", 
                file: "video/YTDown.com_YouTube_Media_TwbY4Aduc7M_001_1080p.mp4"
            },
            {
                title: "라인댄스 3",
                file: "video/YTDown.com_YouTube_Media_mEl68R6Odrs_001_1080p.mp4"
            },
            {
                title: "Mr Showman",
                file: "video/YTDown.com_YouTube_Mr-Showman-Line-Dance-Improver-Rob-Fowle_Media_cNt54D31hdk_001_1080p.mp4"
            },
            {
                title: "Raise Me Up",
                file: "video/YTDown.com_YouTube_Tutorial-Raise-Me-Up-NC-linedance_Media_KYrmZ9s2zEI_001_1080p.mp4"
            }
        ];
        // ========================================

        let currentIndex = 0;
        let playMode = 'all';
        let isConnectedToTV = false;

        const videoPlayer = document.getElementById('videoPlayer');
        const playlistEl = document.getElementById('playlist');
        const playBtn = document.getElementById('playBtn');
        const castBtn = document.getElementById('castBtn');
        const castText = document.getElementById('castText');
        const muteNotice = document.getElementById('muteNotice');

        // 초기화
        function init() {
            document.getElementById('totalCount').textContent = playlist.length;
            renderPlaylist();
            loadVideo(0);
            setupRemotePlayback();
            
            // 페이지 로딩 후 자동 재생 (음소거 상태)
            autoPlayVideo();
        }

        // 자동 재생 시도
        function autoPlayVideo() {
            videoPlayer.muted = true;
            videoPlayer.play().then(() => {
                // 자동 재생 성공 - 음소거 알림 표시
                muteNotice.classList.add('show');
            }).catch(err => {
                console.log('자동 재생 실패:', err);
            });
        }

        // 음소거 해제
        function unmute() {
            videoPlayer.muted = false;
            muteNotice.classList.remove('show');
        }

        // Remote Playback API 설정
        function setupRemotePlayback() {
            if ('remote' in videoPlayer) {
                videoPlayer.remote.watchAvailability(available => {
                    if (available) {
                        document.querySelector('.cast-help').textContent = 'TV가 감지되었어요! 버튼을 누르세요';
                    }
                }).catch(() => {});

                videoPlayer.remote.onconnecting = () => {
                    castText.textContent = '연결 중...';
                };

                videoPlayer.remote.onconnect = () => {
                    isConnectedToTV = true;
                    castBtn.classList.add('connected');
                    castText.textContent = '📺 TV 연결됨';
                    document.querySelector('.cast-help').textContent = '다시 누르면 연결 해제';
                    // TV 연결되면 음소거 해제
                    videoPlayer.muted = false;
                    muteNotice.classList.remove('show');
                };

                videoPlayer.remote.ondisconnect = () => {
                    isConnectedToTV = false;
                    castBtn.classList.remove('connected');
                    castText.textContent = 'TV로 보내기';
                    document.querySelector('.cast-help').textContent = '버튼을 누르면 TV 목록이 나타나요';
                };
            }
        }

        // TV 캐스트 실행
        function castToTV() {
            // 영상이 재생 중인지 확인, 아니면 재생
            if (videoPlayer.paused) {
                videoPlayer.play();
            }

            // Remote Playback API 사용
            if ('remote' in videoPlayer) {
                videoPlayer.remote.prompt()
                    .then(() => {
                        console.log('TV 연결 성공');
                        // 연결 성공하면 음소거 해제
                        videoPlayer.muted = false;
                        muteNotice.classList.remove('show');
                    })
                    .catch(error => {
                        console.log('TV 연결 실패:', error);
                        if (error.name === 'NotFoundError' || error.name === 'NotSupportedError') {
                            showHelp();
                        }
                    });
            } else {
                showHelp();
            }
        }

        // 도움말 표시
        function showHelp() {
            document.getElementById('helpModal').classList.add('show');
        }

        function closeHelp() {
            document.getElementById('helpModal').classList.remove('show');
        }

        // 재생목록 렌더링
        function renderPlaylist() {
            playlistEl.innerHTML = playlist.map((video, index) => `
                <div class="playlist-item ${index === currentIndex ? 'playing' : ''}" 
                     onclick="playVideo(${index})">
                    <div class="item-number">${index + 1}</div>
                    <div class="item-title">${video.title}</div>
                </div>
            `).join('');
        }

        // 영상 로드
        function loadVideo(index) {
            if (index < 0 || index >= playlist.length) return;
            
            currentIndex = index;
            videoPlayer.src = playlist[index].file;
            document.getElementById('currentTitle').textContent = playlist[index].title;
            document.getElementById('currentIndex').textContent = index + 1;
            renderPlaylist();
        }

        // 영상 재생
        function playVideo(index) {
            loadVideo(index);
            videoPlayer.play();
            // 사용자가 직접 재생하면 음소거 해제
            videoPlayer.muted = false;
            muteNotice.classList.remove('show');
        }

        // 재생/일시정지
        function togglePlay() {
            if (videoPlayer.paused) {
                videoPlayer.play();
                // 재생 버튼 누르면 음소거 해제
                videoPlayer.muted = false;
                muteNotice.classList.remove('show');
            } else {
                videoPlayer.pause();
            }
        }

        // 이전 영상
        function prevVideo() {
            const newIndex = currentIndex <= 0 ? playlist.length - 1 : currentIndex - 1;
            playVideo(newIndex);
        }

        // 다음 영상
        function nextVideo() {
            const newIndex = currentIndex >= playlist.length - 1 ? 0 : currentIndex + 1;
            playVideo(newIndex);
        }

        // 재생 모드 설정
        function setPlayMode(mode) {
            playMode = mode;
            document.getElementById('modeAll').classList.remove('active');
            document.getElementById('modeSingle').classList.remove('active');
            
            if (mode === 'all') {
                document.getElementById('modeAll').classList.add('active');
            } else {
                document.getElementById('modeSingle').classList.add('active');
            }
        }

        // 비디오 이벤트
        videoPlayer.addEventListener('ended', () => {
            if (playMode === 'single') {
                videoPlayer.currentTime = 0;
                videoPlayer.play();
            } else {
                nextVideo();
            }
        });

        videoPlayer.addEventListener('play', () => {
            playBtn.innerHTML = '⏸ 정지';
        });

        videoPlayer.addEventListener('pause', () => {
            playBtn.innerHTML = '▶ 재생';
        });

        // 시작
        init();
    </script>
</body>
</html>
